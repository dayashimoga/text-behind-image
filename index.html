<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">✨ Text Behind Image</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Text Behind Image</h1><p class="text-muted">Create professional text-behind-subject effects</p></div>
    <div class="glass-card p-4 text-center">
        <canvas id="effectCanvas" width="800" height="500" style="width:100%;background:#111;border-radius:12px;"></canvas>
        <div class="d-flex gap-2 justify-content-center mt-3" style="flex-wrap:wrap;">
            <input type="file" id="imgUpload" accept="image/*" style="display:none;">
            <button class="btn btn-primary" id="uploadImg">📁 Upload Image</button>
            <input type="text" id="behindText" class="form-control" style="max-width:200px;" placeholder="Your text..." value="HELLO">
            <input type="color" id="textColor" value="#ffffff">
            <input type="range" id="textSize" min="40" max="200" value="100" style="width:120px;">
            <button class="btn btn-secondary" id="saveFx">⬇️ Save</button>
        </div>
    </div>
    </main>
